<section class="tdt-item-sheet tdt-item-sheet--magia {{cssClass}}">

  <header class="tdt-item-header">
    <div class="tdt-item-portrait">
      <img src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    </div>
    <div class="tdt-item-identity">
      <input class="tdt-item-name" name="name" type="text" value="{{item.name}}" placeholder="{{localize 'TRESDETALPHA.Nome'}}" />
      <div class="tdt-item-meta">
        <span class="tdt-item-type">{{localize "TYPES.Item.magia"}}</span>
      </div>
    </div>
  </header>

  <section class="tdt-item-grid tdt-item-grid--magia">
    <label class="tdt-item-form-field">
      <span>{{localize "TRESDETALPHA.Escola"}}</span>
      <input name="system.escola" type="text" value="{{system.escola}}" data-dtype="String" placeholder="Ex: Branca, Elemental (fogo)" />
    </label>
    <label class="tdt-item-form-field">
      <span>{{localize "TRESDETALPHA.Custo"}} em PMs</span>
      <input name="system.custo" type="text" value="{{system.custo}}" data-dtype="String" placeholder="Ex: 2 PMs, 1 PM/turno" />
    </label>
    <label class="tdt-item-form-field">
      <span>{{localize "TRESDETALPHA.Alcance"}}</span>
      <input name="system.alcance" type="text" value="{{system.alcance}}" data-dtype="String" placeholder="Ex: curto, longo, toque" />
    </label>
    <label class="tdt-item-form-field">
      <span>{{localize "TRESDETALPHA.Duracao"}}</span>
      <input name="system.duracao" type="text" value="{{system.duracao}}" data-dtype="String" placeholder="Ex: instantânea, sustentável" />
    </label>
    <label class="tdt-item-form-field tdt-item-form-field--wide">
      <span>{{localize "TRESDETALPHA.Exigencias"}}</span>
      <input name="system.exigencias" type="text" value="{{system.exigencias}}" data-dtype="String" placeholder="Ex: Clericato, Arcano" />
    </label>
  </section>

  <nav class="sheet-tabs tabs tdt-item-tabs" data-group="primary">
    <a class="item" data-tab="description">{{localize "TRESDETALPHA.Aba.descricao"}}</a>
  </nav>

  <section class="sheet-body tdt-item-body">
    <div class="tab" data-group="primary" data-tab="description">
      <div class="tdt-item-hint">Efeito e texto completo da magia.</div>
      {{editor system.description target="system.description" rollData=rollData button=true owner=owner editable=editable}}
    </div>
  </section>

</section>

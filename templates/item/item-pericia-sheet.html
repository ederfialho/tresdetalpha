<section class="tdt-item-sheet tdt-item-sheet--pericia {{cssClass}}">

  <header class="tdt-item-header">
    <div class="tdt-item-portrait">
      <img src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    </div>
    <div class="tdt-item-identity">
      <input class="tdt-item-name" name="name" type="text" value="{{item.name}}" placeholder="{{localize 'TRESDETALPHA.Nome'}}" />
      <div class="tdt-item-meta">
        <span class="tdt-item-type">{{localize "TYPES.Item.pericia"}}</span>
        <span class="tdt-item-sep">·</span>
        <label class="tdt-item-field">
          <span>{{localize "TRESDETALPHA.Custo"}}</span>
          <input name="system.custo" type="text" value="{{system.custo}}" data-dtype="Number" />
          <span class="tdt-item-unit">pt</span>
        </label>
      </div>
    </div>
  </header>

  <nav class="sheet-tabs tabs tdt-item-tabs" data-group="primary">
    <a class="item" data-tab="description">{{localize "TRESDETALPHA.Aba.descricao"}}</a>
  </nav>

  <section class="sheet-body tdt-item-body">
    <div class="tab" data-group="primary" data-tab="description">
      <div class="tdt-item-hint">Descrição da perícia e especializações.</div>
      {{editor system.description target="system.description" rollData=rollData button=true owner=owner editable=editable}}
    </div>
  </section>

</section>
